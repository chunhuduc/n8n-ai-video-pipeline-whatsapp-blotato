<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --fg: #f4f4f5;
    --muted: rgba(244,244,245,0.5);
    --accent: #6ea8ff;
    --line: rgba(255,255,255,0.1);
    --surface: rgba(255,255,255,0.04);
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* Progress bar */
  #progress-track { height: 3px; background: var(--line); flex-shrink: 0; }
  #progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

  /* Header */
  header {
    flex-shrink: 0;
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .tag {
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(110,168,255,0.15);
    color: var(--accent);
  }
  .header-links {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }
  header a {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
  }
  header a:hover { opacity: 0.8; }
  .byline-link {
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.2s;
  }
  .byline-link:hover { color: var(--fg); }
  .byline-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
    flex-shrink: 0;
  }

  /* Slide area */
  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
    gap: 1.25rem;
  }

  #slide-image-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    width: 100%;
    max-width: 1080px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    /* allow transforms on child without clipping them */
    touch-action: none;
  }

  #slide-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity 0.15s ease;
    transform-origin: center center;
    /* cursor hint that image is interactive on desktop */
    cursor: zoom-in;
    user-select: none;
    -webkit-user-drag: none;
  }
  #slide-img.loading { opacity: 0; }
  #slide-img.zoomed { cursor: zoom-out; }

  /* Zoom hint badge — shown briefly on first load, touch devices only via JS */
  #zoom-hint {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.35rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #zoom-hint.show { opacity: 1; }

  /* Spinner overlay */
  #img-spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  #img-spinner.visible { opacity: 1; }
  .spinner-ring {
    width: 36px;
    height: 36px;
    border: 2.5px solid rgba(110,168,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #slide-caption {
    width: 100%;
    max-width: 1080px;
    text-align: center;
  }
  #slide-caption p {
    font-family: var(--mono);
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--fg);
  }
  #slide-caption small {
    display: block;
    margin-top: 0.25rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* Footer */
  footer {
    flex-shrink: 0;
    padding: 0.875rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    border-top: 1px solid var(--line);
  }
  button {
    padding: 0.4rem 1.1rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--fg);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.75; }
  button:disabled { opacity: 0.3; cursor: default; }
  #counter { font-size: 0.85rem; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="app">
  <div id="progress-track"><div id="progress-fill"></div></div>

  <header>
    <h1 id="hd-title"></h1>
    <div class="tags" id="hd-tags"></div>
    <div class="header-links">
      <a id="hd-github" href="#" target="_blank" rel="noopener noreferrer" style="display:none">GitHub ↗</a>
      <a class="byline-link" href="https://chunhuduc.com" target="_blank" rel="noopener noreferrer">
        <span class="byline-dot"></span>chunhuduc.com
      </a>
    </div>
  </header>

  <main>
    <div id="slide-image-wrap">
      <img id="slide-img" src="" alt="">
      <div id="img-spinner"><div class="spinner-ring"></div></div>
      <div id="zoom-hint">&#x1F50D; pinch to zoom</div>
    </div>
    <div id="slide-caption">
      <p id="caption-text"></p>
      <small id="caption-sub"></small>
    </div>
  </main>

  <footer>
    <button id="btn-prev" aria-label="Previous slide">← Prev</button>
    <span id="counter"></span>
    <button id="btn-next" aria-label="Next slide">Next →</button>
  </footer>
</div>

<script>
const SLIDES = {
  "title": "n8n AI Video Pipeline with WhatsApp Approval Gates",
  "tags": [
    "n8n",
    "Claude API",
    "HeyGen",
    "ElevenLabs",
    "WhatsApp Business API",
    "Blotato",
    "Google Drive"
  ],
  "github": "https://github.com/chunhuduc/n8n-ai-video-pipeline-whatsapp-blotato",
  "slides": [
    {
      "image": "step-01.png",
      "caption": "Daily Script Generation",
      "sub": "Morning cron fires in n8n → Claude API generates platform-optimized script (TikTok hook, Reels body, CTA) from brand guidelines and rotating content schedule"
    },
    {
      "image": "step-02.png",
      "caption": "WhatsApp Script Approval Gate",
      "sub": "Script delivered as WhatsApp Business API interactive message — owner taps Approve, Reject, or sends text revision notes which loop back to Claude for automated re-draft"
    },
    {
      "image": "step-03.png",
      "caption": "HeyGen Avatar Render + ElevenLabs Voice",
      "sub": "Approved script triggers HeyGen API with owner's Avatar ID and ElevenLabs Voice ID — n8n polls render status every 15 s until video URL is ready"
    },
    {
      "image": "step-04.png",
      "caption": "Google Drive B-roll Scan + AI Gap Fill",
      "sub": "n8n scans Drive asset library by script B-roll tags — matched clips are pulled directly, missing segments are generated via AI video API and assembled into a complete draft"
    },
    {
      "image": "step-05.png",
      "caption": "WhatsApp Video Approval Gate",
      "sub": "Draft video URL sent to owner via WhatsApp — Approve & Post routes to publish, revision notes route back to assembly for automated re-render. Nothing posts without sign-off."
    },
    {
      "image": "step-06.png",
      "caption": "Blotato Multi-Platform Publish + Drive Write-Back",
      "sub": "Single Blotato API call publishes simultaneously to TikTok, Reels, Shorts, and Facebook — published video auto-saved to Completed Assets folder so the content library compounds daily"
    }
  ]
};

let idx = 0;
const total = SLIDES.slides.length;

// populate static header
document.getElementById('hd-title').textContent = SLIDES.title;
const tagsEl = document.getElementById('hd-tags');
(SLIDES.tags || []).forEach(t => {
  const s = document.createElement('span');
  s.className = 'tag';
  s.textContent = t;
  tagsEl.appendChild(s);
});
if (SLIDES.github) {
  const a = document.getElementById('hd-github');
  a.href = SLIDES.github;
  a.style.display = '';
}

const imgEl = document.getElementById('slide-img');
const spinner = document.getElementById('img-spinner');
const wrap = document.getElementById('slide-image-wrap');
const zoomHint = document.getElementById('zoom-hint');

// ----- Loading spinner -----
function showSpinner() {
  imgEl.classList.add('loading');
  spinner.classList.add('visible');
}
function hideSpinner() {
  imgEl.classList.remove('loading');
  spinner.classList.remove('visible');
}
imgEl.addEventListener('load', hideSpinner);
imgEl.addEventListener('error', hideSpinner);

// ----- Zoom (pinch + double-tap / double-click) -----
let scale = 1, tx = 0, ty = 0;
let zoomHintShown = false;

function applyTransform(animated) {
  if (animated) imgEl.style.transition = 'transform 0.25s ease';
  else imgEl.style.transition = '';
  imgEl.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  imgEl.classList.toggle('zoomed', scale > 1);
}

function resetZoom(animated) {
  scale = 1; tx = 0; ty = 0;
  applyTransform(animated);
}

// Clamp pan so image never pans too far off screen
function clampPan() {
  const r = wrap.getBoundingClientRect();
  const maxX = (r.width  * (scale - 1)) / 2;
  const maxY = (r.height * (scale - 1)) / 2;
  tx = Math.max(-maxX, Math.min(maxX, tx));
  ty = Math.max(-maxY, Math.min(maxY, ty));
}

// Double-click to toggle zoom on desktop
imgEl.addEventListener('dblclick', e => {
  if (scale > 1) { resetZoom(true); return; }
  const r = wrap.getBoundingClientRect();
  const cx = e.clientX - r.left - r.width  / 2;
  const cy = e.clientY - r.top  - r.height / 2;
  scale = 2.5;
  tx = -cx * (scale - 1) / scale;
  ty = -cy * (scale - 1) / scale;
  clampPan();
  applyTransform(true);
});

// Pinch-to-zoom + drag on mobile
let pt1 = null, pt2 = null;
let startScale = 1, startTx = 0, startTy = 0;
let startMidX = 0, startMidY = 0;
let startDist = 0;
let doubleTapTimer = null, lastTapTime = 0;

function dist(a, b) {
  return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
}
function mid(a, b) {
  return { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
}

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    // double-tap detection
    const now = Date.now();
    if (now - lastTapTime < 300) {
      e.preventDefault();
      if (scale > 1) { resetZoom(true); }
      else {
        const r = wrap.getBoundingClientRect();
        const t = e.touches[0];
        const cx = t.clientX - r.left - r.width  / 2;
        const cy = t.clientY - r.top  - r.height / 2;
        scale = 2.5;
        tx = -cx * (scale - 1) / scale;
        ty = -cy * (scale - 1) / scale;
        clampPan();
        applyTransform(true);
      }
      lastTapTime = 0;
      return;
    }
    lastTapTime = now;
    pt1 = e.touches[0];
    pt2 = null;
    startTx = tx; startTy = ty;
  }
  if (e.touches.length === 2) {
    e.preventDefault();
    pt1 = e.touches[0]; pt2 = e.touches[1];
    startScale = scale;
    startTx = tx; startTy = ty;
    startDist = dist(pt1, pt2);
    const m = mid(pt1, pt2);
    const r = wrap.getBoundingClientRect();
    startMidX = m.x - r.left - r.width  / 2;
    startMidY = m.y - r.top  - r.height / 2;
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pt2) {
    e.preventDefault();
    const a = e.touches[0], b = e.touches[1];
    const newDist = dist(a, b);
    scale = Math.max(1, Math.min(5, startScale * newDist / startDist));
    const m = mid(a, b);
    const r = wrap.getBoundingClientRect();
    const curMidX = m.x - r.left - r.width  / 2;
    const curMidY = m.y - r.top  - r.height / 2;
    tx = startTx + (curMidX - startMidX);
    ty = startTy + (curMidY - startMidY);
    clampPan();
    applyTransform(false);
  } else if (e.touches.length === 1 && scale > 1) {
    // pan when zoomed
    e.preventDefault();
    const t = e.touches[0];
    if (pt1) {
      tx = startTx + (t.clientX - pt1.clientX);
      ty = startTy + (t.clientY - pt1.clientY);
      clampPan();
      applyTransform(false);
    }
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  if (e.touches.length < 2) pt2 = null;
  if (e.touches.length === 0) {
    pt1 = null;
    if (scale < 1.05) resetZoom(true);
  }
});

// When navigating slides, reset zoom
function resetSlideZoom() { scale = 1; tx = 0; ty = 0; imgEl.style.transition = ''; imgEl.style.transform = ''; imgEl.classList.remove('zoomed'); }

// Show zoom hint on touch devices, briefly
function maybeShowZoomHint() {
  if (zoomHintShown) return;
  if (!('ontouchstart' in window)) return;
  zoomHintShown = true;
  zoomHint.classList.add('show');
  setTimeout(() => { zoomHint.classList.remove('show'); }, 3000);
}

// ----- Slide navigation -----
// Swipe only navigates when not zoomed
let swipeTx = null;
document.addEventListener('touchstart', e => {
  if (scale > 1) return;
  swipeTx = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (scale > 1 || swipeTx === null) return;
  const dx = e.changedTouches[0].clientX - swipeTx;
  swipeTx = null;
  if (Math.abs(dx) < 50) return;
  go(dx < 0 ? idx + 1 : idx - 1);
});

function preloadAll() {
  SLIDES.slides.forEach(s => { const i = new Image(); i.src = s.image; });
}

function render() {
  resetSlideZoom();
  const slide = SLIDES.slides[idx];
  const newSrc = slide.image;
  const resolved = new URL(newSrc, location.href).href;
  if (imgEl.src !== resolved || !imgEl.complete || imgEl.naturalWidth === 0) {
    showSpinner();
  }
  imgEl.src = newSrc;
  imgEl.alt = slide.caption;
  document.getElementById('caption-text').textContent = slide.caption;
  const sub = document.getElementById('caption-sub');
  sub.textContent = slide.sub || '';
  sub.style.display = slide.sub ? '' : 'none';
  document.getElementById('counter').textContent = `${idx + 1} / ${total}`;
  const pct = total > 1 ? ((idx + 1) / total) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('btn-prev').disabled = total <= 1;
  document.getElementById('btn-next').disabled = total <= 1;
}

function go(n) { idx = ((n % total) + total) % total; render(); }

document.getElementById('btn-prev').onclick = () => go(idx - 1);
document.getElementById('btn-next').onclick = () => go(idx + 1);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(idx - 1);
  else if (e.key === 'ArrowRight') go(idx + 1);
  else if (e.key === 'Escape') resetZoom(true);
});

render();
setTimeout(() => { preloadAll(); maybeShowZoomHint(); }, 400);
</script>
</body>
</html>
