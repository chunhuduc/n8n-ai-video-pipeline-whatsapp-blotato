<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --fg: #f4f4f5;
    --muted: rgba(244,244,245,0.5);
    --accent: #6ea8ff;
    --line: rgba(255,255,255,0.1);
    --surface: rgba(255,255,255,0.04);
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* Progress bar */
  #progress-track { height: 3px; background: var(--line); flex-shrink: 0; }
  #progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

  /* Header */
  header {
    flex-shrink: 0;
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .tag {
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(110,168,255,0.15);
    color: var(--accent);
  }
  .header-links {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }
  header a {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
  }
  header a:hover { opacity: 0.8; }
  .byline-link {
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.2s;
  }
  .byline-link:hover { color: var(--fg); }
  .byline-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
    flex-shrink: 0;
  }

  /* Slide area */
  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
    gap: 1.25rem;
  }

  #slide-image-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    width: 100%;
    max-width: 1080px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
  }

  #slide-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity 0.15s ease;
  }
  #slide-img.loading { opacity: 0; }

  /* Spinner overlay */
  #img-spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  #img-spinner.visible { opacity: 1; }
  .spinner-ring {
    width: 36px;
    height: 36px;
    border: 2.5px solid rgba(110,168,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #slide-caption {
    width: 100%;
    max-width: 1080px;
    text-align: center;
  }
  #slide-caption p {
    font-family: var(--mono);
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--fg);
  }
  #slide-caption small {
    display: block;
    margin-top: 0.25rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* Footer */
  footer {
    flex-shrink: 0;
    padding: 0.875rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    border-top: 1px solid var(--line);
  }
  button {
    padding: 0.4rem 1.1rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--fg);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.75; }
  button:disabled { opacity: 0.3; cursor: default; }
  #counter { font-size: 0.85rem; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="app">
  <div id="progress-track"><div id="progress-fill"></div></div>

  <header>
    <h1 id="hd-title"></h1>
    <div class="tags" id="hd-tags"></div>
    <div class="header-links">
      <a id="hd-github" href="#" target="_blank" rel="noopener noreferrer" style="display:none">GitHub ↗</a>
      <a class="byline-link" href="https://chunhuduc.com" target="_blank" rel="noopener noreferrer">
        <span class="byline-dot"></span>chunhuduc.com
      </a>
    </div>
  </header>

  <main>
    <div id="slide-image-wrap">
      <img id="slide-img" src="" alt="">
      <div id="img-spinner"><div class="spinner-ring"></div></div>
    </div>
    <div id="slide-caption">
      <p id="caption-text"></p>
      <small id="caption-sub"></small>
    </div>
  </main>

  <footer>
    <button id="btn-prev" aria-label="Previous slide">← Prev</button>
    <span id="counter"></span>
    <button id="btn-next" aria-label="Next slide">Next →</button>
  </footer>
</div>

<script>
const SLIDES = /* __SLIDES_DATA__ */null;

let idx = 0;
const total = SLIDES.slides.length;

// populate static header
document.getElementById('hd-title').textContent = SLIDES.title;
const tagsEl = document.getElementById('hd-tags');
(SLIDES.tags || []).forEach(t => {
  const s = document.createElement('span');
  s.className = 'tag';
  s.textContent = t;
  tagsEl.appendChild(s);
});
if (SLIDES.github) {
  const a = document.getElementById('hd-github');
  a.href = SLIDES.github;
  a.style.display = '';
}

const imgEl = document.getElementById('slide-img');
const spinner = document.getElementById('img-spinner');

function showSpinner() {
  imgEl.classList.add('loading');
  spinner.classList.add('visible');
}
function hideSpinner() {
  imgEl.classList.remove('loading');
  spinner.classList.remove('visible');
}

imgEl.addEventListener('load', hideSpinner);
imgEl.addEventListener('error', hideSpinner);

// Preload all images in background after first render
function preloadAll() {
  SLIDES.slides.forEach(s => { const i = new Image(); i.src = s.image; });
}

function render() {
  const slide = SLIDES.slides[idx];
  if (!imgEl.complete || imgEl.naturalWidth === 0 || imgEl.src !== new URL(slide.image, location.href).href) {
    showSpinner();
  }
  imgEl.src = slide.image;
  imgEl.alt = slide.caption;
  document.getElementById('caption-text').textContent = slide.caption;
  const sub = document.getElementById('caption-sub');
  sub.textContent = slide.sub || '';
  sub.style.display = slide.sub ? '' : 'none';
  document.getElementById('counter').textContent = `${idx + 1} / ${total}`;
  const pct = total > 1 ? ((idx + 1) / total) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('btn-prev').disabled = total <= 1;
  document.getElementById('btn-next').disabled = total <= 1;
}

function go(n) { idx = ((n % total) + total) % total; render(); }

document.getElementById('btn-prev').onclick = () => go(idx - 1);
document.getElementById('btn-next').onclick = () => go(idx + 1);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(idx - 1);
  else if (e.key === 'ArrowRight') go(idx + 1);
});

let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  tx = null;
  if (Math.abs(dx) < 40) return;
  go(dx < 0 ? idx + 1 : idx - 1);
});

render();
// Preload remaining images after a brief delay so first image gets priority
setTimeout(preloadAll, 300);
</script>
</body>
</html>
